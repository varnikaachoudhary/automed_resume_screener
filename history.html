<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload History</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#f5ebe0,#d6ccc2);
  padding:10px 20px;
}

/* Navbar */

.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#b08968;
  padding:15px 30px;
  border-radius:12px;
  margin-bottom:30px;
}

.logo{
  font-size:20px;
  font-weight:600;
  color:white;
}

.nav-links a{
  margin-left:20px;
  text-decoration:none;
  color:white;
  font-weight:500;
}

.nav-links a:hover{
  color:#f5ebe0;
}

h1{
  text-align:center;
  color:#6f4e37;
  margin-bottom:30px;
}

/* Cards */

.container{
  max-width:1000px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card h3{
  color:#7f5539;
  margin-bottom:10px;
}

.card p{
  margin:8px 0;
  color:#444;
}

.badge{
  display:inline-block;
  margin-top:10px;
  padding:5px 12px;
  border-radius:20px;
  background:#b08968;
  color:white;
  font-size:13px;
}

</style>
</head>

<body>

<!-- Navbar -->

<div class="navbar">

  <div class="logo">ResumeAI</div>

  <div class="nav-links">
    <a href="screen.html">Dashboard</a>
    <a href="results.html">Results</a>
    <a href="history.html">History</a>
    <a href="index.html">Logout</a>
  </div>

</div>

<h1>Upload History</h1>

<div class="container" id="historyContainer"></div>

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {

  apiKey: "AIzaSyBj0OS-b6oMX21RGInDrgI-UcNxxXj6wOs",
  authDomain: "resume-screening-system-54c01.firebaseapp.com",
  projectId: "resume-screening-system-54c01",
  storageBucket: "resume-screening-system-54c01.firebasestorage.app",
  messagingSenderId: "52477918180",
  appId: "1:52477918180:web:e3eeb6806c6b3671f125f1"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const container =
document.getElementById("historyContainer");

db.collection("screenings")
.orderBy("timestamp","desc")
.get()

.then(snapshot=>{

  if(snapshot.empty){

    container.innerHTML =
    "<h2>No History Found</h2>";

    return;

  }

  snapshot.forEach(doc=>{

    const data = doc.data();

    let resultsHTML = "";

    // 🔥 NEW FIELD
    if(data.analyzedResults){

      data.analyzedResults.forEach(candidate=>{

        resultsHTML += `

          <div style="
            margin-top:10px;
            padding:10px;
            background:#f5ebe0;
            border-radius:10px;
          ">

            <p>
              <strong>${candidate.name}</strong>
            </p>

            <p>
              Score:
              ${candidate.score}%
            </p>

            <p>
              ${candidate.recommendation}
            </p>

          </div>

        `;

      });

    }

    container.innerHTML += `

      <div class="card">

        <h3>
          ${data.jobRole.toUpperCase()}
        </h3>

        <br>

        <p>
          <strong>Admin:</strong>
          ${data.adminName}
        </p>

        <p>
          <strong>Description:</strong>
          ${data.jobDescription}
        </p>

        <br>

        <h4>Analyzed Candidates:</h4>

        ${resultsHTML}

      </div>

    `;

  });

})

.catch(err=>{

  console.error(err);

  alert(err.message);

});

</script>

</body>
</html>
