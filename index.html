<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resume Screening</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f5ebe0, #d6ccc2);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      width: 85%;
      height: 80vh;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .left {
      flex: 1;
      background: linear-gradient(135deg, #d5bdaf, #b08968);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px;
    }

    .left h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    .right {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: #f5ebe0;
      padding: 30px;
      border-radius: 15px;
      width: 80%;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      text-align: center;
    }

    .card h2 {
      margin-bottom: 20px;
      color: #6f4e37;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .btn {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #b08968;
      color: white;
      cursor: pointer;
    }

    .btn:hover {
      background: #7f5539;
    }

    .toggle {
      margin-top: 10px;
      cursor: pointer;
      color: #6f4e37;
      font-size: 14px;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="left">
    <h1>Smart Resume Screening</h1>
    <p>Automate hiring with AI-powered resume analysis.</p>
  </div>

  <div class="right">
    <div class="card">
      <h2 id="formTitle">Login</h2>

      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">

      <button class="btn" onclick="handleAuth()">Login</button>

      <p class="toggle" onclick="toggleForm()">Don't have an account? Register</p>
    </div>
  </div>

</div>

<!-- Firebase (COMPAT VERSION) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
  // 🔥 PUT YOUR FIREBASE CONFIG HERE
  const firebaseConfig = {
  apiKey: "AIzaSyBj0OS-b6oMX21RGInDrgI-UcNxxXj6wOs",
  authDomain: "resume-screening-system-54c01.firebaseapp.com",
  projectId: "resume-screening-system-54c01",
  storageBucket: "resume-screening-system-54c01.firebasestorage.app",
  messagingSenderId: "52477918180",
  appId: "1:52477918180:web:e3eeb6806c6b3671f125f1"
};

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  function toggleForm() {
    const title = document.getElementById('formTitle');
    const btn = document.querySelector('.btn');
    const toggle = document.querySelector('.toggle');

    if (title.innerText === 'Login') {
      title.innerText = 'Register';
      btn.innerText = 'Register';
      toggle.innerText = 'Already have an account? Login';
    } else {
      title.innerText = 'Login';
      btn.innerText = 'Login';
      toggle.innerText = "Don't have an account? Register";
    }
  }

  function handleAuth() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const mode = document.getElementById('formTitle').innerText;

    if (!email || !password) {
      alert("Please fill all fields");
      return;
    }

    if (mode === "Login") {
      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          alert("Login successful");
          window.location.href = "screen.html";
        })
        .catch(err => alert(err.message));
    } else {
      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          alert("Registration successful");
          toggleForm();
        })
        .catch(err => alert(err.message));
    }
  }
</script>

</body>
</html>
